# docker-compose.yml — Hackathon Build
# Only external service needed: Qdrant (vector database for RAG)
# Everything else runs locally:
#   - Frontend + API: npm run dev (Next.js on :3000)
#   - Database: SQLite via Prisma (file-based, zero config)
#   - AI: Gemini API (cloud, no container needed)
#
# Usage: docker compose up -d

services:

  # ─── Qdrant (Vector DB for Law Embeddings / RAG) ───────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: nextgen-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  qdrant-data:
